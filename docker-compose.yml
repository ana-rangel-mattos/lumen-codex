version: '3.9'

services:
  backend:
    container_name: lumencodex-backend
    build:
      context: ./LumenCodex.Server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      # CRITICAL FOR LUMENCODEX:
      # Maps your local courses folder to a folder inside the container
      - ~/Documents:/app/documents

  frontend:
    container_name: lumencodex-frontend
    build:
      context: ./LumenCodex.Client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
